<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 315" fill="none">
  <defs>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- ── Card 1: Long-running ─────────────────────────────────────── -->
  <rect x="10" y="10" width="190" height="210" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="105" cy="62" r="28" fill="#EEF2FF"/>
  <circle cx="105" cy="62" r="16" stroke="#4F46E5" stroke-width="2"/>
  <line x1="105" y1="62" x2="105" y2="50" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="62" x2="115" y2="67" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="105" cy="62" r="2.5" fill="#4F46E5"/>
  <text x="105" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1E1B4B">Long-running</text>
  <text x="105" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">Survive crashes,</text>
  <text x="105" y="149" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">restarts, and deploys.</text>
  <text x="105" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4F46E5">recovery · HITL · history</text>

  <!-- ── Card 2: Plan-Execute ─────────────────────────────────────── -->
  <rect x="210" y="10" width="190" height="210" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="305" cy="62" r="28" fill="#EEF2FF"/>
  <circle cx="305" cy="49" r="6" fill="#4F46E5"/>
  <circle cx="289" cy="75" r="6" fill="#4F46E5"/>
  <circle cx="321" cy="75" r="6" fill="#4F46E5"/>
  <line x1="302" y1="54" x2="292" y2="70" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="308" y1="54" x2="318" y2="70" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="292,70 289,62 296,65" fill="#4F46E5"/>
  <polygon points="318,70 324,65 321,62" fill="#4F46E5"/>
  <text x="305" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1E1B4B">Plan-Execute</text>
  <text x="305" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">LLM plans once;</text>
  <text x="305" y="149" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">Conductor executes.</text>
  <text x="305" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4F46E5">adaptive · replay-safe</text>

  <!-- ── Card 3: Event-driven ─────────────────────────────────────── -->
  <rect x="410" y="10" width="190" height="210" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="505" cy="62" r="28" fill="#EEF2FF"/>
  <path d="M510 44 L498 66 L506 66 L501 80 L517 58 L509 58 Z" fill="#4F46E5"/>
  <text x="505" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1E1B4B">Event-driven</text>
  <text x="505" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">Triggered by time</text>
  <text x="505" y="149" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">or external events.</text>
  <text x="505" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4F46E5">cron · Kafka · webhooks</text>

  <!-- ── Card 4: Adaptive loops ───────────────────────────────────── -->
  <rect x="610" y="10" width="190" height="210" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="705" cy="62" r="28" fill="#EEF2FF"/>
  <!-- Circular arrow: ~240° arc with arrowhead -->
  <path d="M 705 48 A 14 14 0 1 1 693 69"
        fill="none" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"
        marker-end="url(#loop-arrow)"/>
  <text x="705" y="114" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1E1B4B">Adaptive loops</text>
  <text x="705" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">Iterate until correct.</text>
  <text x="705" y="149" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B7280">Each iteration durable.</text>
  <text x="705" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4F46E5">replan · converge · DO_WHILE</text>

  <!-- ── Connector lines ──────────────────────────────────────────── -->
  <line x1="105" y1="220" x2="105" y2="252" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="305" y1="220" x2="305" y2="252" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="505" y1="220" x2="505" y2="252" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="705" y1="220" x2="705" y2="252" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ── Agentspan Runtime base bar ─────────────────────────────── -->
  <rect x="10" y="254" width="800" height="50" rx="10" fill="#4F46E5"/>
  <rect x="24"  y="268" width="22" height="6" rx="3" fill="white" opacity="0.45"/>
  <rect x="30"  y="279" width="30" height="6" rx="3" fill="white" opacity="0.28"/>
  <rect x="26"  y="290" width="16" height="6" rx="3" fill="white" opacity="0.16"/>
  <text x="410" y="285" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="0.3">Agentspan Runtime</text>
</svg>
